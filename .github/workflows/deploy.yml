name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Tailwind
        run: npx tailwindcss -i ./src/assets/css/main.css -o ./src/assets/css/tailwind.css --minify

      - name: Build Eleventy
        run: npx @11ty/eleventy

      - name: Copy CSS to _site
        run: mkdir -p _site/assets/css && cp src/assets/css/tailwind.css _site/assets/css/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
