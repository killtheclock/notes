backend:
  name: github
  repo: killtheclock/notes
  branch: main
  base_url: https://sage-axolotl-c8f1fe.netlify.app
  auth_endpoint: auth
  site_id: 15c0583a-6e27-40c6-b27d-c237966d3916

publish_mode: editorial_workflow

media_folder: "src/assets/images"
public_folder: "/notes/assets/images"

locale: el

collections:
  - name: "posts"
    label: "Άρθρα"
    folder: "src/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "layouts/post.njk"
      - label: "Τίτλος"
        name: "title"
        widget: "string"
      - label: "Περιγραφή"
        name: "description"
        widget: "text"
      - label: "Ημερομηνία"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false
      - label: "Συγγραφέας"
        name: "author"
        widget: "string"
        default: "Your Name"
      - label: "Κατηγορία"
        name: "category"
        widget: "select"
        options:
          - { label: "Τεχνολογία", value: "tech" }
          - { label: "Design", value: "design" }
          - { label: "Κώδικας", value: "code" }
          - { label: "Σκέψεις", value: "thought" }
          - { label: "Ζωή", value: "life" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        default: ["posts"]
      - label: "Περιεχόμενο"
        name: "body"
        widget: "markdown"
